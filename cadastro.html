<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Simplic</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background-color: #f4f4f4; color: #333; }
        .header { background: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; }
        .logo { color: #4caf50; font-size: 24px; font-weight: bold; font-style: italic; }
        .progress-container { background: #eee; padding: 20px 10px; display: flex; justify-content: center; align-items: center; }
        .step-bar { display: flex; align-items: center; width: 80%; }
        .dot { width: 15px; height: 15px; background: #ffcc00; border-radius: 50%; }
        .dot.active { background: #4caf50; }
        .line { flex-grow: 1; height: 2px; background: #ffcc00; }
        .form-container { background: white; padding: 20px; }
        .form-title { color: #4caf50; text-align: center; font-size: 28px; margin-bottom: 25px; font-weight: bold; }
        .input-group { margin-bottom: 15px; width: 100%; }
        label { display: block; font-size: 14px; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; background: #fdfdfd; font-size: 16px; }
        input.erro { border: 2px solid #ff4d4d; background: #fff2f2; }
        .checkbox-group { display: flex; align-items: flex-start; gap: 10px; margin: 20px 0; font-size: 13px; }
        .btn-avancar { background: #ffcc00; color: #333; border: none; padding: 15px; width: 100%; border-radius: 5px; font-size: 18px; font-weight: bold; text-transform: uppercase; cursor: pointer; display: flex; justify-content: center; align-items: center; min-height: 55px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #333; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">Simplic</div>
        <div style="font-size: 24px; color: #4caf50;">☰</div>
    </div>

    <div class="progress-container">
        <div class="step-bar">
            <div class="dot active"></div><div class="line"></div>
            <div class="dot"></div><div class="line"></div>
            <div class="dot"></div><div class="line"></div>
            <div class="dot"></div><div class="line"></div>
            <div class="dot"></div>
        </div>
    </div>

    <div class="form-container">
        <h2 class="form-title">Cadastro</h2>

        <div class="input-group">
            <label>Nome Completo *</label>
            <input type="text" id="nome" placeholder="Seu nome completo">
        </div>

        <div class="input-group">
            <label>Data de Nascimento *</label>
            <input type="date" id="nascimento">
        </div>

        <div class="input-group">
            <label>E-mail *</label>
            <input type="email" id="email" placeholder="exemplo@email.com">
        </div>

        <div class="input-group">
            <label>CPF *</label>
            <input type="tel" id="cpf" placeholder="000.000.000-00" maxlength="14">
        </div>

        <div class="input-group">
            <label>Telefone Celular *</label>
            <input type="tel" id="telefone" placeholder="(00) 00000-0000" maxlength="15">
        </div>

        <div class="input-group">
            <label>CEP *</label>
            <input type="tel" id="cep" placeholder="00000-000" maxlength="9">
        </div>

        <div class="input-group">
            <label>Cidade *</label>
            <input type="text" id="cidade" placeholder="Cidade">
        </div>

        <div class="input-group">
            <label>Estado *</label>
            <input type="text" id="estado" list="lista-estados" placeholder="Selecione o Estado">
            <datalist id="lista-estados">
                <option value="Acre">AC</option><option value="Alagoas">AL</option><option value="Amapá">AP</option>
                <option value="Amazonas">AM</option><option value="Bahia">BA</option><option value="Ceará">CE</option>
                <option value="Distrito Federal">DF</option><option value="Espírito Santo">ES</option><option value="Goiás">GO</option>
                <option value="Maranhão">MA</option><option value="Mato Grosso">MT</option><option value="Mato Grosso do Sul">MS</option>
                <option value="Minas Gerais">MG</option><option value="Pará">PA</option><option value="Paraíba">PB</option>
                <option value="Paraná">PR</option><option value="Pernambuco">PE</option><option value="Piauí">PI</option>
                <option value="Rio de Janeiro">RJ</option><option value="Rio Grande do Norte">RN</option><option value="Rio Grande do Sul">RS</option>
                <option value="Rondônia">RO</option><option value="Roraima">RR</option><option value="Santa Catarina">SC</option>
                <option value="São Paulo">SP</option><option value="Sergipe">SE</option><option value="Tocantins">TO</option>
            </datalist>
        </div>

        <button class="btn-avancar" id="btnProximo">
            <span id="textoBtn">AVANÇAR ›</span>
            <div id="loader" class="loader" style="display: none;"></div>
        </button>
    </div>

    <script>
        const inputs = {
            cpf: document.getElementById('cpf'),
            tel: document.getElementById('telefone'),
            cep: document.getElementById('cep'),
            email: document.getElementById('email'),
            nome: document.getElementById('nome'),
            cidade: document.getElementById('cidade'),
            estado: document.getElementById('estado')
        };

        // MÁSCARAS
        inputs.cpf.addEventListener('input', e => {
            let v = e.target.value.replace(/\D/g, "");
            v = v.replace(/(\d{3})(\d)/, "$1.$2").replace(/(\d{3})(\d)/, "$1.$2").replace(/(\d{3})(\d{1,2})$/, "$1-$2");
            e.target.value = v;
        });

        inputs.tel.addEventListener('input', e => {
            let v = e.target.value.replace(/\D/g, "");
            v = v.replace(/^(\d{2})(\d)/g, "($1) $2").replace(/(\d{5})(\d)/, "$1-$2");
            e.target.value = v;
        });

        // CEP COM BUSCA AUTOMÁTICA DE CIDADE/ESTADO
        inputs.cep.addEventListener('input', async e => {
            let v = e.target.value.replace(/\D/g, "");
            v = v.replace(/(\d{5})(\d)/, "$1-$2");
            e.target.value = v;

            if (v.length === 9) {
                const cep = v.replace("-", "");
                try {
                    const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                    const data = await response.json();
                    if (!data.erro) {
                        inputs.cidade.value = data.localidade;
                        inputs.estado.value = data.uf;
                        inputs.cidade.classList.remove('erro');
                        inputs.estado.classList.remove('erro');
                    }
                } catch (err) { console.error("Erro ao buscar CEP"); }
            }
        });

        function validar() {
            let erro = false;
            Object.values(inputs).forEach(i => i.classList.remove('erro'));

            if (inputs.nome.value.trim().split(" ").length < 2) { inputs.nome.classList.add('erro'); erro = "Nome completo obrigatório"; }
            if (inputs.cpf.value.replace(/\D/g, "").length !== 11) { inputs.cpf.classList.add('erro'); erro = "CPF inválido"; }
            if (inputs.tel.value.replace(/\D/g, "").length !== 11) { inputs.tel.classList.add('erro'); erro = "Telefone inválido"; }
            if (inputs.cep.value.replace(/\D/g, "").length !== 8) { inputs.cep.classList.add('erro'); erro = "CEP inválido"; }
            if (!inputs.cidade.value) { inputs.cidade.classList.add('erro'); erro = "Cidade obrigatória"; }
            if (!inputs.estado.value) { inputs.estado.classList.add('erro'); erro = "Estado obrigatório"; }

            if (erro) { alert(erro); return false; }
            return true;
        }

        document.getElementById("btnProximo").onclick = function() {
            if (!validar()) return;
            document.querySelectorAll('input').forEach(campo => {
                if (campo.id) localStorage.setItem(campo.id, campo.value);
            });
            this.disabled = true;
            document.getElementById("textoBtn").style.display = "none";
            document.getElementById("loader").style.display = "block";
            setTimeout(() => { window.location.href = "pessoal.html"; }, 1500);
        };
    </script>
</body>
</html>
