<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proposta Aprovada - Simplic</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background-color: #f4f4f4; text-align: center; color: #333; }
        .header { background: white; padding: 15px; border-bottom: 1px solid #ddd; }
        .logo { color: #4caf50; font-size: 24px; font-weight: bold; font-style: italic; }
        
        .success-container { background: white; margin: 20px; padding: 40px 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .icon-check { font-size: 60px; color: #4caf50; margin-bottom: 20px; }
        
        h2 { color: #4caf50; margin-bottom: 10px; }
        p { font-size: 16px; color: #666; line-height: 1.5; }
        
        .info-box { background: #e8f5e9; border: 1px dashed #4caf50; padding: 15px; margin: 25px 0; border-radius: 5px; }
        
        .btn-finalizar {
            background: #ffcc00; color: #333; border: none; padding: 18px; width: 100%; 
            border-radius: 5px; font-size: 18px; font-weight: bold; text-transform: uppercase; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">Simplic</div>
    </div>

    <div class="success-container">
        <div class="icon-check">✔</div>
        <h2>Proposta Pré-Aprovada!</h2>
        <p>Boa notícia! Seu perfil foi analisado e você tem um limite disponível para saque.</p>

        <div class="info-box">
            <p style="margin: 0; font-weight: bold; color: #2e7d32;">O dinheiro será depositado na conta informada em até 24 horas úteis.</p>
        </div>

        <p style="font-size: 14px;">Para concluir, enviamos um link de confirmação para o seu e-mail e SMS.</p>

        <button class="btn-finalizar" onclick="window.location.href='index.html'">VOLTAR AO INÍCIO</button>
    </div>

</body>
</html>
