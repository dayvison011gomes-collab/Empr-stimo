<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empréstimo Rápido</title>
    <style>
        :root {
            --primary-green: #00a651;
            --accent-yellow: #ffcc00;
            --bg-gray: #f4f4f4;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--primary-green);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            color: white;
            font-size: 28px;
            margin-bottom: 20px;
            text-transform: uppercase;
            text-align: center;
            font-weight: bold;
        }

        .container {
            background: white;
            width: 90%;
            max-width: 400px;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            box-sizing: border-box;
        }

        .title {
            font-size: 16px;
            margin: 15px 0;
            font-weight: bold;
            color: #333;
        }

        .slider-container {
            text-align: center;
            margin-bottom: 25px;
        }

        .slider-value {
            background: var(--primary-green);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            display: inline-block;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        input[type=range] {
            width: 100%;
            cursor: pointer;
            height: 8px;
            accent-color: var(--primary-green);
        }

        .parcelas-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .parcela-item {
            background: var(--bg-gray);
            padding: 15px 10px;
            border-radius: 10px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
        }

        .parcela-item.active {
            border-color: var(--primary-green);
            background: #e8f5e9;
            color: var(--primary-green);
            font-weight: bold;
        }

        .btn {
            margin-top: 25px;
            background: var(--accent-yellow);
            color: #333;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 0 #d4aa00;
            transition: transform 0.1s;
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #d4aa00;
        }
    </style>
</head>
<body>

    <h1>Empréstimo rápido</h1>

    <div class="container">
        <div class="slider-container">
            <div class="title">1. Quer um empréstimo de quanto?</div>
            <div class="slider-value" id="valor-display">R$ 2.000</div>
            <input type="range" min="500" max="10000" step="100" value="2000" id="valor_selecionado">
        </div>

        <div class="title">2. Quer pagar em quantas parcelas?</div>
        <div class="parcelas-grid" id="grid-parcelas">
            </div>

        <button class="btn" id="btnSolicitar">SOLICITE JÁ!</button>
    </div>

    <script>
        const slider = document.getElementById("valor_selecionado");
        const valorDisplay = document.getElementById("valor-display");
        const gridParcelas = document.getElementById("grid-parcelas");
        const btnSolicitar = document.getElementById("btnSolicitar");
        
        const opcoesMeses = [3, 6, 9, 12];
        const taxaJuros = 0.045; 
        let parcelaSelecionada = 12;

        function formatarMoeda(valor) {
            return valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        function calcularParcela(principal, meses) {
            const i = taxaJuros;
            const n = meses;
            const valorParcela = principal * ( (i * Math.pow(1+i, n)) / (Math.pow(1+i, n) - 1) );
            return valorParcela;
        }

        function renderizarParcelas() {
            const montante = parseFloat(slider.value);
            gridParcelas.innerHTML = "";

            opcoesMeses.forEach(meses => {
                const valorMensal = calcularParcela(montante, meses);
                const div = document.createElement("div");
                div.className = `parcela-item ${meses === parcelaSelecionada ? 'active' : ''}`;
                div.innerHTML = `${meses}x de<br>${formatarMoeda(valorMensal)}`;
                
                div.onclick = () => {
                    parcelaSelecionada = meses;
                    // Salva a parcela escolhida também
                    localStorage.setItem('parcelas', meses);
                    renderizarParcelas();
                };
                
                gridParcelas.appendChild(div);
            });
        }

        slider.oninput = function() {
            valorDisplay.innerText = formatarMoeda(parseFloat(this.value)).replace(",00", "");
            renderizarParcelas();
            // Salva o valor no LocalStorage
            localStorage.setItem('valor_selecionado', this.value);
        };

        btnSolicitar.onclick = function() {
            // Garante que salvou antes de mudar de página
            localStorage.setItem('valor_selecionado', slider.value);
            localStorage.setItem('parcelas', parcelaSelecionada);
            window.location.href = "cadastro.html";
        };

        renderizarParcelas();

        // CÓDIGO GRAVADOR UNIVERSAL
        document.querySelectorAll('input, select').forEach(campo => {
            campo.onchange = () => {
                if (campo.id) {
                    localStorage.setItem(campo.id, campo.value);
                }
            };
        });
    </script>
</body>
</html>
