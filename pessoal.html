<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informações Pessoais - Simplic</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background-color: #f4f4f4; color: #333; }
        .header { background: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; }
        .logo { color: #4caf50; font-size: 24px; font-weight: bold; font-style: italic; }
        .progress-container { background: #eee; padding: 20px 10px; display: flex; justify-content: center; align-items: center; }
        .step-bar { display: flex; align-items: center; width: 80%; }
        .dot { width: 15px; height: 15px; background: #4caf50; border-radius: 50%; }
        .line { flex-grow: 1; height: 2px; background: #4caf50; }
        .dot.inactive { background: #ffcc00; }
        .line.inactive { background: #ffcc00; }
        
        .form-container { background: white; padding: 20px; }
        .section-title { color: #4caf50; font-size: 22px; margin-bottom: 20px; font-weight: bold; }
        .input-group { margin-bottom: 15px; width: 100%; }
        label { display: block; font-size: 14px; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; background: #fdfdfd; font-size: 16px; }
        input.erro, select.erro { border: 2px solid #ff4d4d; background: #fff2f2; }
        
        .btn-avancar { background: #ffcc00; color: #333; border: none; padding: 15px; width: 100%; border-radius: 5px; font-size: 18px; font-weight: bold; text-transform: uppercase; cursor: pointer; margin-top: 20px; display: flex; justify-content: center; align-items: center; min-height: 55px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #333; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">Simplic</div>
        <div style="font-size: 24px; color: #4caf50;">☰</div>
    </div>

    <div class="progress-container">
        <div class="step-bar">
            <div class="dot"></div><div class="line"></div>
            <div class="dot"></div><div class="line"></div>
            <div class="dot inactive"></div><div class="line inactive"></div>
            <div class="dot inactive"></div><div class="line inactive"></div>
            <div class="dot inactive"></div>
        </div>
    </div>

    <div class="form-container">
        <h2 class="section-title">Informações Pessoais</h2>

        <div class="input-group">
            <label>Nome Completo da Sua Mãe *</label>
            <input type="text" id="nome_mae" placeholder="Nome completo da mãe">
        </div>

        <div class="input-group">
            <label>Escolaridade *</label>
            <select id="escolaridade">
                <option value="">Por favor selecione</option>
                <option value="Ensino Fundamental">Ensino Fundamental</option>
                <option value="Ensino Médio">Ensino Médio</option>
                <option value="Ensino Superior">Ensino Superior</option>
                <option value="Pós-graduação">Pós-graduação</option>
            </select>
        </div>

        <div class="input-group">
            <label>Nacionalidade *</label>
            <select id="nacionalidade">
                <option value="Brasil">Brasil</option>
                <option value="Estrangeiro">Estrangeiro</option>
            </select>
        </div>

        <h2 class="section-title" style="margin-top: 30px;">Endereço</h2>

        <div class="input-group">
            <label>CEP *</label>
            <input type="tel" id="cep_pessoal" placeholder="00000-000" maxlength="9">
        </div>

        <div class="input-group">
            <label>Endereço *</label>
            <input type="text" id="endereco_rua" placeholder="Rua, Avenida, etc">
        </div>

        <div class="input-group">
            <label>Número *</label>
            <input type="tel" id="endereco_numero" placeholder="Número">
        </div>

        <div class="input-group">
            <label>Complemento</label>
            <input type="text" id="complemento" placeholder="Apto, Bloco (Opcional)">
        </div>

        <div class="input-group">
            <label>Cidade *</label>
            <input type="text" id="cidade_pessoal" placeholder="Cidade" readonly style="background: #eee;">
        </div>

        <div class="input-group">
            <label>Estado *</label>
            <input type="text" id="estado_pessoal" placeholder="Estado" readonly style="background: #eee;">
        </div>

        <button class="btn-avancar" id="btnContinuar">
            <span id="textoBtn">CONTINUAR ›</span>
            <div id="loader" class="loader"></div>
        </button>
    </div>

    <script>
        const campos = {
            mae: document.getElementById('nome_mae'),
            escolaridade: document.getElementById('escolaridade'),
            nacionalidade: document.getElementById('nacionalidade'),
            cep: document.getElementById('cep_pessoal'),
            rua: document.getElementById('endereco_rua'),
            numero: document.getElementById('endereco_numero'),
            complemento: document.getElementById('complemento'),
            cidade: document.getElementById('cidade_pessoal'),
            estado: document.getElementById('estado_pessoal')
        };

        // Máscara CEP + Busca Automática
        campos.cep.addEventListener('input', async (e) => {
            let v = e.target.value.replace(/\D/g, "");
            v = v.replace(/(\d{5})(\d)/, "$1-$2");
            e.target.value = v;

            if (v.length === 9) {
                const res = await fetch(`https://viacep.com.br/ws/${v.replace("-","")}/json/`);
                const data = await res.json();
                if (!data.erro) {
                    campos.rua.value = data.logradouro;
                    campos.cidade.value = data.localidade;
                    campos.estado.value = data.uf;
                    campos.numero.focus();
                }
            }
        });

        function validar() {
            let temErro = false;
            Object.values(campos).forEach(el => el.classList.remove('erro'));

            if (campos.mae.value.trim().split(" ").length < 2) { campos.mae.classList.add('erro'); temErro = true; }
            if (campos.escolaridade.value === "") { campos.escolaridade.classList.add('erro'); temErro = true; }
            if (campos.cep.value.length < 9) { campos.cep.classList.add('erro'); temErro = true; }
            if (campos.rua.value === "") { campos.rua.classList.add('erro'); temErro = true; }
            if (campos.numero.value === "") { campos.numero.classList.add('erro'); temErro = true; }

            if (temErro) {
                alert("Por favor, preencha todos os campos obrigatórios corretamente.");
                return false;
            }
            return true;
        }

        document.getElementById('btnContinuar').onclick = function() {
            if (!validar()) return;

            // SALVANDO NA "BIBLIOTECA" (LocalStorage)
            localStorage.setItem('nome_mae', campos.mae.value);
            localStorage.setItem('escolaridade', campos.escolaridade.value);
            localStorage.setItem('nacionalidade', campos.nacionalidade.value);
            localStorage.setItem('cep_pessoal', campos.cep.value);
            localStorage.setItem('endereco_rua', campos.rua.value);
            localStorage.setItem('endereco_numero', campos.numero.value);
            localStorage.setItem('complemento', campos.complemento.value);
            localStorage.setItem('cidade_pessoal', campos.cidade.value);
            localStorage.setItem('estado_pessoal', campos.estado.value);

            this.disabled = true;
            document.getElementById('textoBtn').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            setTimeout(() => {
                window.location.href = "financeiro.html";
            }, 1000);
        };
    </script>
</body>
</html>
